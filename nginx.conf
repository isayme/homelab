server {
    listen 80;
    server_name _;

    include mime.types;

    # 静态资源路径
    root /usr/share/nginx/html;
    index index.html;

    # .yaml 默认 MIME 类型为 application/octet-stream，浏览器 DevTools 展示为乱码
    types {
        text/plain yaml yml;
    }

    location / {
        # 核心：尝试查找请求的文件，如果找不到则返回 index.html
        # 这对于前端路由（如 Vue Router/React Router history 模式）至关重要
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存优化（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 避免将敏感文件暴露给客户端
    location ~ /\.ht {
        deny all;
    }

    charset utf-8;
}
