name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches: [ master ]

jobs:
  build-web:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build
        run: npm install && npm run build

